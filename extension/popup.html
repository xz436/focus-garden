<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf9f6; color: #1a1a2e; padding: 16px; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #9ca3af; margin-bottom: 16px; }
    .status { font-size: 12px; padding: 10px; border-radius: 10px; margin-bottom: 12px; }
    .status.connected { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status.disconnected { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
    button { width: 100%; padding: 8px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #22c55e; color: white; }
    .btn-primary:hover { background: #16a34a; }
    .btn-danger { background: #fee2e2; color: #dc2626; margin-top: 8px; }
    .btn-danger:hover { background: #fecaca; }
    .log { font-size: 11px; color: #6b7280; margin-top: 12px; max-height: 100px; overflow-y: auto; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #f3f4f6; }
    .log-entry.success { color: #16a34a; }
  </style>
</head>
<body>
  <h1>Focus Garden</h1>
  <p class="subtitle">NeetCode Problem Tracker</p>

  <div id="status" class="status disconnected">Not connected</div>

  <div id="setup">
    <label>Focus Garden URL</label>
    <input type="text" id="appUrl" placeholder="https://focus-garden-iota.vercel.app" />

    <label>Supabase URL</label>
    <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co" />

    <label>Supabase Anon Key</label>
    <input type="text" id="supabaseKey" placeholder="eyJ..." />

    <button class="btn-primary" id="saveBtn">Connect</button>
  </div>

  <div id="connected" style="display:none;">
    <button class="btn-danger" id="disconnectBtn">Disconnect</button>
  </div>

  <div class="log" id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
